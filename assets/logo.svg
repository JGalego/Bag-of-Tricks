<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" role="img" aria-label="bag of tricks">
  <title>bag of tricks</title>

  <!-- white background -->
  <rect width="800" height="800" fill="#ffffff"/>

  <!-- the trick, conjured from the hat: interrobang + sparkles -->
  <g fill="#111111">
    <text x="600" y="285" font-family="Georgia, 'Times New Roman', serif"
          font-size="170" text-anchor="middle">&#8253;</text>
    <!-- 4-point sparkles -->
    <path d="M575 110 C575 134 551 158 527 158 C551 158 575 182 575 206 C575 182 599 158 623 158 C599 158 575 134 575 110 Z"/>
    <path d="M678 205 C678 221 662 237 646 237 C662 237 678 253 678 269 C678 253 694 237 710 237 C694 237 678 221 678 205 Z"/>
    <path d="M512 250 C512 262 500 274 488 274 C500 274 512 286 512 298 C512 286 524 274 536 274 C524 274 512 262 512 250 Z"/>
  </g>

  <!-- top hat (the bag of tricks), with a cylindrical, dimensional crown -->
  <g>
    <!-- brim ellipse + a faint top-surface highlight catching light on the sides -->
    <ellipse cx="400" cy="500" rx="222" ry="46" fill="#111111"/>
    <ellipse cx="400" cy="491" rx="208" ry="38" fill="#ffffff" opacity="0.10"/>
    <!-- crown body: a slightly tapered cylinder, curved where it meets the brim -->
    <path d="M278 300 L296 470 Q400 494 504 470 L522 300 Z" fill="#111111"/>
    <!-- left-side sheen, to read as a glossy curved surface -->
    <path d="M308 306 Q289 388 309 468 L335 472 Q317 392 331 310 Z" fill="#ffffff" opacity="0.12"/>
    <!-- white hat band, curved to wrap the crown -->
    <path d="M293 446 Q400 470 507 446 L503 482 Q400 506 297 482 Z" fill="#ffffff"/>
    <!-- closed top cap (ellipse) + a rim highlight to define the 3D opening -->
    <ellipse cx="400" cy="300" rx="122" ry="20" fill="#111111"/>
    <path d="M300 296 Q338 281 402 280" fill="none" stroke="#ffffff"
          stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- wordmark -->
  <text x="400" y="668" text-anchor="middle"
        font-family="'SF Mono', ui-monospace, 'Menlo', 'Consolas', monospace"
        font-size="62" font-weight="600" letter-spacing="1" fill="#111111">bag of tricks</text>
</svg>
